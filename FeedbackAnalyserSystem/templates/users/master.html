<!DOCTYPE html>
<html>
<head> 
  <title>{% block title %}{% endblock %}</title>
  {% load bootstrap5 %}
  {% bootstrap_css %}
  {% bootstrap_javascript %}
</head>
<body>

<div class="container">
  <ul class="nav bg-info">
    <li class="nav-item">
      <a class="nav-link link-light" href="/">HOME</a>
    </li>
    <li class="nav-item">
      <a class="nav-link link-light" href="/users/">MEMBERS</a>
    </li>
    <li class="nav-item">
      <a class="nav-link link-light" href="/register/">REGISTER</a>
    </li>
    <li class="nav-item">
      <a class="nav-link link-light" href="/login/">LOGIN</a>
    </li>
    <li class="nav-item">
      <form class="logout" action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button class="btn btn-danger btn-logout" type="submit" title="User logout">Logout</button>
      </form>
    </li>
  </ul>

  {% block content %}
  {% endblock %}
</div>
</body>
</html>
